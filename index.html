<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stored Procedure – Salary Comparison</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            padding: 40px 24px;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 32px;
            color: #222;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .card p {
            padding: 10px 14px;
            font-size: 13px;
            color: #555;
            border-bottom: 1px solid #eee;
        }

        .card img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Stored Procedure — Salary Comparison</h1>

    <div class="grid">
        <div class="card">
            <p>1. Creating the Stored Procedure</p>
            <img src="images/creating_stored_procedure.png" alt="Creating Stored Procedure">
        </div>
        <div class="card">
            <p>2. Executing the Procedure</p>
            <img src="images/execute_the_procedure-execution_result.png" alt="Execute the Stored Procedure">
        </div>
        <div class="card">
            <p>3. Execution Result</p>
            <img src="images/execute_the_procedure-execution_result-2.png" alt="Execution Result">
        </div>
    </div>

</body>
</html>
